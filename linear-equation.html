<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일차방정식 양팔저울 실험실</title>
<style>
body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#eef6ff,#fff7ed);color:#222;padding:18px}
.app{max-width:900px;margin:auto}
.card{background:white;border-radius:22px;padding:22px;margin:16px 0;box-shadow:0 8px 24px rgba(0,0,0,.12)}
h1{margin:0 0 8px;color:#1d4ed8}
.sub{color:#666;line-height:1.6}
.equation{font-size:34px;font-weight:900;text-align:center;margin:20px 0}
.scale{display:grid;grid-template-columns:1fr 80px 1fr;align-items:end;gap:12px;margin:20px 0}
.pan{min-height:120px;border:4px solid #60a5fa;border-radius:18px;background:#eff6ff;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:15px;font-size:24px;font-weight:900}
.center{height:150px;display:flex;flex-direction:column;align-items:center;justify-content:end}
.pole{width:10px;height:100px;background:#475569}
.base{width:70px;height:12px;background:#475569;border-radius:10px}
.block{background:#2563eb;color:white;padding:10px 14px;border-radius:12px}
.num{background:#f97316;color:white;padding:10px 14px;border-radius:12px}
button{border:0;border-radius:14px;padding:12px 16px;margin:5px;font-weight:800;font-size:15px;cursor:pointer}
.primary{background:#2563eb;color:white}
.good{background:#dcfce7;color:#166534}
.warn{background:#fef3c7;color:#92400e}
.gray{background:#f3f4f6;color:#374151}
.options{display:flex;flex-wrap:wrap;justify-content:center}
.message{font-size:18px;line-height:1.7;text-align:center;padding:12px;border-radius:14px;background:#f8fafc}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{text-align:center;background:#f8fafc;border-radius:16px;padding:14px}
.stat b{font-size:24px;display:block}
@media(max-width:700px){
.equation{font-size:26px}
.scale{grid-template-columns:1fr;gap:8px}
.center{display:none}
.stats{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>⚖️ 일차방정식 양팔저울 실험실</h1>
    <p class="sub">
      등식의 성질을 이용해 방정식을 풀어 봅시다.  
      양쪽에 같은 연산을 하면 저울의 균형이 유지됩니다.
    </p>
    <button class="primary" onclick="newQuestion()">새 문제 시작</button>
    <button class="gray" onclick="resetQuestion()">현재 문제 다시 풀기</button>
  </div>

  <div class="stats">
    <div class="stat"><b id="qnum">0</b>문항</div>
    <div class="stat"><b id="score">0</b>성공</div>
    <div class="stat"><b id="step">0</b>단계</div>
  </div>

  <div class="card">
    <div class="equation" id="equation">문제를 시작하세요</div>

    <div class="scale">
      <div class="pan" id="leftPan"></div>
      <div class="center">
        <div class="pole"></div>
        <div class="base"></div>
      </div>
      <div class="pan" id="rightPan"></div>
    </div>

    <div class="message" id="message">
      새 문제 시작을 눌러 주세요.
    </div>
  </div>

  <div class="card">
    <h2>1단계: 양쪽에서 같은 수를 빼기</h2>
    <div class="options" id="subtractOptions"></div>
  </div>

  <div class="card">
    <h2>2단계: 양쪽을 같은 수로 나누기</h2>
    <div class="options" id="divideOptions"></div>
  </div>
</div>

<script>
let a, b, x, leftText, rightValue;
let stage = 0;
let qnum = 0;
let score = 0;
let step = 0;
let solvedThis = false;

function makeEquation(){
  a = rand(2, 9);
  x = rand(1, 9);
  b = rand(1, 15);
  rightValue = a * x + b;
  leftText = `${a}x + ${b}`;
  stage = 0;
  step = 0;
  solvedThis = false;
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function newQuestion(){
  qnum++;
  makeEquation();
  render();
  setMessage(`문제: ${a}x + ${b} = ${rightValue}<br>먼저 양쪽에서 무엇을 빼야 할까요?`);
}

function resetQuestion(){
  if(!a){ newQuestion(); return; }
  stage = 0;
  step = 0;
  solvedThis = false;
  render();
  setMessage(`다시 풀어봅시다. 먼저 양쪽에서 ${b}를 빼야 합니다.`);
}

function render(){
  document.getElementById("qnum").innerText = qnum;
  document.getElementById("score").innerText = score;
  document.getElementById("step").innerText = step;

  if(stage === 0){
    document.getElementById("equation").innerText = `${a}x + ${b} = ${rightValue}`;
    document.getElementById("leftPan").innerHTML = `<span class="block">${a}x</span><span class="num">+ ${b}</span>`;
    document.getElementById("rightPan").innerHTML = `<span class="num">${rightValue}</span>`;
  }

  if(stage === 1){
    document.getElementById("equation").innerText = `${a}x = ${rightValue-b}`;
    document.getElementById("leftPan").innerHTML = `<span class="block">${a}x</span>`;
    document.getElementById("rightPan").innerHTML = `<span class="num">${rightValue-b}</span>`;
  }

  if(stage === 2){
    document.getElementById("equation").innerText = `x = ${x}`;
    document.getElementById("leftPan").innerHTML = `<span class="block">x</span>`;
    document.getElementById("rightPan").innerHTML = `<span class="num">${x}</span>`;
  }

  makeButtons();
}

function makeButtons(){
  const subBox = document.getElementById("subtractOptions");
  const divBox = document.getElementById("divideOptions");
  subBox.innerHTML = "";
  divBox.innerHTML = "";

  let nums = shuffle([b, rand(1,15), rand(1,15), rand(1,15)]);
  nums = [...new Set(nums)].slice(0,4);
  while(nums.length<4) nums.push(rand(1,15));
  nums = shuffle(nums);

  nums.forEach(n=>{
    const btn = document.createElement("button");
    btn.className = "warn";
    btn.innerText = `양쪽에서 ${n} 빼기`;
    btn.onclick = ()=>subtract(n);
    subBox.appendChild(btn);
  });

  let divs = shuffle([a, rand(2,9), rand(2,9), rand(2,9)]);
  divs = [...new Set(divs)].slice(0,4);
  while(divs.length<4) divs.push(rand(2,9));
  divs = shuffle(divs);

  divs.forEach(n=>{
    const btn = document.createElement("button");
    btn.className = "good";
    btn.innerText = `양쪽을 ${n}로 나누기`;
    btn.onclick = ()=>divide(n);
    divBox.appendChild(btn);
  });
}

function subtract(n){
  if(stage !== 0){
    setMessage("지금은 빼기 단계가 아닙니다.");
    return;
  }
  step++;
  if(n === b){
    stage = 1;
    render();
    setMessage(`좋아요! 양쪽에서 ${b}를 빼면<br>${a}x = ${rightValue-b} 가 됩니다.<br>이제 양쪽을 무엇으로 나누어야 할까요?`);
  } else {
    render();
    setMessage(`아쉬워요. ${a}x + ${b}에서 상수 ${b}를 없애야 하므로 양쪽에서 ${b}를 빼야 합니다.`);
  }
}

function divide(n){
  if(stage !== 1){
    setMessage("먼저 양쪽에서 상수를 빼야 합니다.");
    return;
  }
  step++;
  if(n === a){
    stage = 2;
    render();
    if(!solvedThis){
      score++;
      solvedThis = true;
    }
    document.getElementById("score").innerText = score;
    setMessage(`정답입니다! 🎉<br>${a}x = ${rightValue-b} 에서 양쪽을 ${a}로 나누면<br>x = ${x} 입니다.`);
  } else {
    render();
    setMessage(`아쉬워요. ${a}x에서 x만 남기려면 양쪽을 ${a}로 나누어야 합니다.`);
  }
}

function setMessage(text){
  document.getElementById("message").innerHTML = text;
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}
</script>
</body>
</html>
